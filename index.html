<style>
:root {
    --bg-color: #fff0f5;
    --text-color: #4a0404;
    --accent-gold: #d4af37;
    --soft-pink: #ffb7b2;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Montserrat', sans-serif;
    background:var(--bg-color);
    color:var(--text-color);
    overflow-x:hidden;
    scroll-behavior:smooth;
}

h1,h2 { font-family:'Great Vibes', cursive; }

#particles-container {
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}

.heart {
    position:absolute;
    bottom:-20px;
    width:10px;
    height:10px;
    background:rgba(255,183,178,0.6);
    transform:rotate(45deg);
    animation:floatUp 6s linear forwards;
}

.heart:before,
.heart:after {
    content:"";
    position:absolute;
    width:10px;
    height:10px;
    background:rgba(255,183,178,0.6);
    border-radius:50%;
}

.heart:before { top:-5px; left:0; }
.heart:after { left:-5px; top:0; }

@keyframes floatUp {
    0% { transform:translateY(0) scale(1); opacity:0.8; }
    100% { transform:translateY(-110vh) scale(1.5); opacity:0; }
}

.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background: radial-gradient(circle at center, #fff0f5 0%, #ffdde1 100%);
    position:relative;
    z-index:2;
}

.hero h1 { font-size:5rem; margin-bottom:10px; }
.hero p { font-size:1.5rem; margin-bottom:40px; font-style:italic; }

.btn-glow {
    padding:15px 40px;
    font-size:1.1rem;
    background:linear-gradient(45deg,#b20a2c,#bd1f36);
    color:white;
    border:none;
    border-radius:50px;
    cursor:pointer;
}

.section {
    padding:80px 20px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:2;
}

.section-title {
    font-size:3rem;
    margin-bottom:50px;
}

.gallery-grid {
    display:flex;
    gap:40px;
    flex-wrap:wrap;
    justify-content:center;
}

.polaroid {
    background:white;
    padding:15px 15px 40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    width:280px;
    text-align:center;
}

.polaroid img {
    width:100%;
    height:320px;
    object-fit:cover;
}

.caption {
    margin-top:15px;
    font-family:'Great Vibes', cursive;
    font-size:1.8rem;
}

#shayari-section {
    background:linear-gradient(to bottom,#2c0e0e,#4a0404);
    color:#ffdbe7;
}

.shayari-container {
    max-width:800px;
    text-align:center;
}

.wait-message {
    margin-bottom:40px;
    font-size:1.5rem;
}

.shayari-line {
    opacity:0;
    transform:translateY(20px);
    transition:1s;
    margin-bottom:20px;
    font-family:'Playfair Display', serif;
    font-size:1.7rem;
    line-height:1.6;
}

.shayari-line.show {
    opacity:1;
    transform:translateY(0);
}

#music-section { position:relative; }

.music-overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

.music-message { color:white; font-size:1.8rem; text-align:center; }

.letter-container {
    max-width:700px;
    background:white;
    padding:50px;
    text-align:center;
}

.sign-off {
    font-family:'Great Vibes', cursive;
    font-size:3rem;
}

@media(max-width:768px){
    .hero h1 { font-size:3rem; }
    .section-title { font-size:2rem; }
    .polaroid { width:90%; }
}
</style>
</head>

<body>

<section class="hero">

<script>
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

const container = document.getElementById('particles-container');
function createHeart(){
const heart=document.createElement('div');
heart.classList.add('heart');
heart.style.left=Math.random()*100+'vw';
heart.style.animationDuration=(4+Math.random()*3)+'s';
container.appendChild(heart);
setTimeout(()=>heart.remove(),7000);
}
setInterval(createHeart,400);

const shayaris=[
`कभी-कभी मेरा दिल करता है कि इस पल को यहीं रोक कर 3–4 महीने पीछे चला जाऊँ और उस वक्त को फिर से महसूस करूँ। 
वो दिन जैसा भी था, पर मेरे लिए काफ़ी महत्वपूर्ण था। तुम मानो या न मानो, मेरे लिए तुम बहुत ख़ास हो। ✨

पता नहीं प्यार पक्का है या कच्चा, पर प्यार ज़रूर है। तुम्हारा पास न होना भी कभी-कभी ऐसा लगता है 
जैसे तुम कहीं पास ही हो। पता नहीं क्यों, अंदर ही अंदर तुम्हें खो देने का एक डर सा बना रहता है। 💔

किस शब्दों में तुम्हें अनुवाद करूँ? मेरे लिए सब कुछ तुम ही हो। मेरे लिए तुम चाँद हो, जिसके नूर से मैं 
खिल उठती हूँ। मेरे लिए तो तुम वो खुशी का पिटारा हो, जिसे खोलते ही मेरे हर सुख-दुख का एहसास 
मिट सा जाता है। 🌙✨

अब मैं क्या बोलूँ… मुझे तो बस आपकी नज़रों से बात करनी है, चाहे वो थोड़ी रूड हो या थोड़ी एग्रेसिव ही क्यों न हो।
 क्योंकि अब आपकी आँखों से मुझे मोह जो हो गया है। 👀❤️

तुम मेरी ज़िंदगी में हो या नहीं, पर मेरी दुआओं में आज भी तुम्हारा नाम सबसे पहले आता है। 🤍🕊️🧿`
];

const shContainer=document.getElementById("shayariContainer");
let delay=0;

shayaris.forEach(text=>{
const lines=text.split("\n");
lines.forEach(line=>{
const p=document.createElement("p");
p.classList.add("shayari-line");
p.textContent=line;
shContainer.appendChild(p);
setTimeout(()=>p.classList.add("show"),delay);
delay+=1500;
});
delay+=2000;
});

function startMusic(){
document.getElementById("overlay").style.display="none";
document.getElementById("loveSong").play();
}
</script>
